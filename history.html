<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History – Sahayak</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #aaa; padding: 8px; vertical-align: top; }
    th { background-color: #f0f0f0; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>
  <h1>🕓 View History</h1>
  <a href="/">⬅️ Back to Home</a>
  <br><br>
  <table>
    <tr>
      <th>ID</th>
      <th>Image</th>
      <th>Prompt</th>
      <th>Gemini Response</th>
      <th>Timestamp</th>
    </tr>
    {% for row in rows %}
    <tr>
      <td>{{ row[0] }}</td>
      <td>{{ row[1] }}</td>
      <td><pre>{{ row[2] }}</pre></td>
      <td><pre>{{ row[3] }}</pre></td>
      <td>{{ row[4] }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
