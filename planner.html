<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weekly Lesson Planner – Sahayak</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="container">
    <h1>📅 Weekly Lesson Planner</h1>
    <a href="/">⬅️ Back to Dashboard</a>

    <!-- 🌐 Language Selector -->
    <h4>🌐 Choose Response Language:</h4>
    <select id="language-select">
      <option value="English">English</option>
      <option value="Tamil">Tamil</option>
      <option value="Hindi">Hindi</option>
      <option value="Telugu">Telugu</option>
      <option value="Kannada">Kannada</option>
      <option value="Malayalam">Malayalam</option>
      <option value="Marathi">Marathi</option>
      <option value="Gujarati">Gujarati</option>
      <option value="Bengali">Bengali</option>
    </select>

    <!-- Planner Form -->
    <form id="planner-form">
      <label for="grade-planner">Grade:</label>
      <select id="grade-planner">
        {% for i in range(1, 13) %}
          <option value="Grade {{ i }}">Grade {{ i }}</option>
        {% endfor %}
      </select>

      <label for="start-date">Start Date:</label>
      <input type="date" id="start-date" required>

      <label for="end-date">End Date:</label>
      <input type="date" id="end-date" required>

      <label for="topics">Topics to cover:</label>
      <textarea id="topics" placeholder="e.g., Water cycle, Multiplication tables..."></textarea>

      <button type="submit">📘 Generate Lesson Plan</button>
    </form>

    <!-- Response Section -->
    <div id="loading" class="hidden">⏳ Processing...</div>
    <div id="response"></div>
  </div>

  <script>
    function getLanguage() {
      return document.getElementById("language-select").value;
    }

    document.getElementById("planner-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      const grade = document.getElementById("grade-planner").value;
      const start_date = document.getElementById("start-date").value;
      const end_date = document.getElementById("end-date").value;
      const topics = document.getElementById("topics").value;
      const language = getLanguage();

      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("response").innerText = "";

      const res = await fetch("/generate-plan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ grade, start_date, end_date, topics, language })
      });

      const data = await res.json();
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("response").innerText = data.response || ("⚠️ " + data.error);
    });
  </script>
</body>
</html>
